spring.application.name=herjahub
spring.datasource.url=jdbc:mysql://localhost:3306/herja_hubs?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=aws123123123
spring.jpa.hibernate.ddl-auto=update
spring.mvc.view.prefix=/WEB-INF/
spring.mvc.view.suffix=.jsp

# File upload settings for product images.
# UploadSizeExceptionResolver turns any exceeded limit here into a clean
# redirect + error message on the Add/Edit Product page, instead of a 500.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Gemini API settings. The key is loaded from the Windows environment variable.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent
